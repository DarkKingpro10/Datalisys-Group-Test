version: "3.9"

services:
  frontend:
    container_name: kpi_frontend
    build: ./frontend
    image: frontend:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
  backend:
    container_name: kpi_backend
    build: ./backend
    image: backend:latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://kpi_user:kpi_pass@db:5432/kpi_db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
  db:
    container_name: kpi_db
    image: dhi/postgres:18-debian13
    restart: unless-stopped
    environment:
      POSTGRES_USER: kpi_user
      POSTGRES_PASSWORD: kpi_pass
      POSTGRES_DB: kpi_db
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
